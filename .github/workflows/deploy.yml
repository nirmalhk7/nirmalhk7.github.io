name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: Production
    env:
      NODE_VERSION: 22.x
      DRAFT: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm i -f

      - name: Generate llms.txt
        run: node scripts/generate-llms.js

      - name: Run tests
        run: npm test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-junit-report
          path: reports/jest-junit.xml
          retention-days: 14

      - name: Build Next.js
        run: npm run build

      - name: Prepare Vercel project configuration
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Create Vercel prebuilt output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Upload Vercel artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: vercel-prebuilt
          path: |
            .vercel/output
            .vercel/project.json

  deploy:
    runs-on: ubuntu-latest
    environment: Production
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Vercel artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-prebuilt
          path: .

      - name: Deploy with Vercel CLI
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Notify placeholder endpoint
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"status":"deployed","commit":"'"${GITHUB_SHA}"'"}' \
            https://example.com/webhook

  publicity:
    runs-on: ubuntu-latest
    environment: Production
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed blog files
        id: changed-blog-files
        uses: tj-actions/changed-files@v44
        with:
          files: content/blog/**.md

      - name: Prepare Social Media Message
        if: steps.changed-blog-files.outputs.any_changed == 'true'
        id: prepare
        run: |
          # Get the first changed blog file
          FILE=$(echo "${{ steps.changed-blog-files.outputs.all_changed_files }}" | awk '{print $1}')
          # Extract title from frontmatter
          TITLE=$(grep -m 1 '^title:' "$FILE" | sed 's/title: //; s/"//g; s/'\''//g')
          SLUG=$(basename "$FILE" .md)
          BASE_URL="https://nirmalhk7.com/blog/$SLUG"
          
          # Twitter Message with UTMs
          TWITTER_URL="$BASE_URL?utm_source=twitter&utm_medium=social"
          TWITTER_MESSAGE="🚀 New blog post: \"$TITLE\"%0A%0ARead it here: $TWITTER_URL%0A%0A#webdev #softwareengineering #coding"
          echo "twitter_message=$TWITTER_MESSAGE" >> $GITHUB_OUTPUT
          
          # Bluesky Message with UTMs
          BLUESKY_URL="$BASE_URL?utm_source=bluesky&utm_medium=social"
          BLUESKY_MESSAGE="🚀 New blog post: \"$TITLE\"%0A%0ARead it here: $BLUESKY_URL%0A%0A#webdev #softwareengineering #coding"
          echo "bluesky_message=$BLUESKY_MESSAGE" >> $GITHUB_OUTPUT

      - name: Post to Twitter
        if: steps.changed-blog-files.outputs.any_changed == 'true'
        uses: ethomson/send-tweet-action@v1
        with:
          status: ${{ steps.prepare.outputs.twitter_message }}
          consumer-key: ${{ secrets.TWITTER_CONSUMER_KEY }}
          consumer-secret: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          access-token: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          access-token-secret: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}

      - name: Post to Bluesky
        if: steps.changed-blog-files.outputs.any_changed == 'true'
        uses: mary-ext/bluesky-post@v2
        with:
          text: ${{ steps.prepare.outputs.bluesky_message }}
          identifier: ${{ secrets.BLUESKY_IDENTIFIER }}
          password: ${{ secrets.BLUESKY_PASSWORD }}
